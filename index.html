<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대구 달성공원 활성화 홈페이지</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    
    <style>
        /* 기본 초기화 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Malgun Gothic', dotum, sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            background-color: #f4f7f4;
        }

        /* 상단 내비게이션 바 */
        header {
            width: 100%;
            height: 70px;
            background-color: #ffffff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #1b9552;
            cursor: pointer;
        }

        nav {
            display: flex;
            gap: 15px;
        }

        nav a {
            text-decoration: none;
            color: #333333;
            font-size: 16px;
            font-weight: bold;
            padding: 8px 16px;
            border-radius: 4px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        nav a.active, nav a:hover {
            background-color: #1b9552;
            color: #ffffff;
        }

        .header-icons {
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 20px;
            color: #555;
        }

        /* 섹션 제어 기본값 (display: none 처리하되 active 시 노출) */
        .page-section {
            width: 100%;
            min-height: 100vh;
            padding-top: 70px;
            display: none;
            position: relative;
        }

        .page-section.active {
            display: block !important;
        }

        /* ----------------------------------------------------
           [Page 1] 메인화면 기본 복원
        ---------------------------------------------------- */
        #main-page {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('KakaoTalk_20260529_164502496_01.jpg') center/cover no-repeat;
            background-color: #333; /* 이미지 로드 실패 시 백업 배경색 */
            color: #ffffff;
            text-align: center;
        }
        
        #main-page.active {
            display: flex !important;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .main-container {
            max-width: 800px;
            padding: 20px;
            z-index: 10;
        }

        .main-subtitle {
            font-size: 18px;
            color: #8ae6b1;
            margin-bottom: 12px;
            font-weight: bold;
            letter-spacing: 1px;
        }
