<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대구 달성공원 활성화 홈페이지</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    
    <style>
        /* 1. 기본 초기화 및 공통 스타일 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Malgun Gothic', dotum, sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            background-color: #ffffff;
        }

        /* 공통 상단 내비게이션 바 (GNB) */
        header {
            width: 100%;
            height: 70px;
            background-color: #ffffff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
            border-bottom: 1px solid #e5e5e5;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            color: #219b56;
            cursor: pointer;
            letter-spacing: -1px;
        }

        nav {
            display: flex;
            height: 100%;
            align-items: center;
        }

        nav a {
            text-decoration: none;
            color: #333333;
            font-size: 16px;
            font-weight: bold;
            padding: 0 25px;
            height: 100%;
            display: flex;
            align-items: center;
            transition: all 0.2s ease;
            cursor: pointer;
            position: relative;
        }

        /* 활성화된 탭 스타일: 상단 이미지와 동일하게 상단 바 및 배경색 채우기 */
        nav a.active {
            background-color: #219b56;
            color: #ffffff;
        }

        .header-icons {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .header-icons .icon-btn {
            font-size: 24px;
            color: #79a089;
            cursor: pointer;
            background: none;
            border: none;
        }

        /* 단일 페이지 내 전환 섹션 제어 */
        .page-section {
            width: 100%;
            min-height: 100vh;
            padding-top: 70px;
            display: none;
            position: relative;
        }

        .page-section.active {
            display: block;
        }

        /* ----------------------------------------------------
           [Page 1] 메인화면 디자인 구현
        ---------------------------------------------------- */
        #main-page {
            /* 배경 이미지를 첨부해주신 메인화면과 일치하도록 세팅 */
            background: url('KakaoTalk_20260529_164502496_01.jpg') center/cover no-repeat;
            position: relative;
        }
        
        #main-page::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            z-index: 1;
        }

        /* 둥근 아치형 마스크 레이어 */
        .main-arch-overlay {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 1100px;
            height: 100%;
            background: rgba(0, 0, 0, 0.45);
            border-bottom-left-radius: 500px;
            border-bottom-right-radius: 500px;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            text-align: center;
            padding: 0 20px;
        }

        /* 메인 꾸밈 나뭇잎 이미지 배치 */
        .leaf-left {
            position: absolute;
            left: 40px;
            top: 100px;
            width: 120px;
            opacity: 0.9;
            z-index: 3;
        }
        .leaf-left-bottom {
            position: absolute;
            left: 30px;
            bottom: 40px;
            width: 140px;
            opacity: 0.9;
            z-index: 3;
        }
        .leaf-right {
            position: absolute;
            right: 40px;
            top: 100px;
            width: 120px;
            opacity: 0.9;
            z-index: 3;
        }

        .char-lion-main {
            position: absolute;
            right: 8%;
            bottom: 5%;
            width: 160px;
            z-index: 3;
        }
