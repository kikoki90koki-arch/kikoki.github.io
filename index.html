<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대구 달성공원</title>
    <style>
        /* 1. 기본 스타일 초기화 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Malgun Gothic', dotum, sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #ffffff;
        }

        /* 2. 상단 헤더 내비게이션 (이미지 상단 구조 반영) */
        header {
            width: 100%;
            height: 80px;
            background-color: #ffffff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 50px;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            color: #1b9552;
            letter-spacing: -1px;
            /* 이미지 특유의 테두리가 있는 듯한 로고 느낌 표현 */
            text-shadow: -1px -1px 0 #ffffff, 1px -1px 0 #ffffff, -1px 1px 0 #ffffff, 1px 1px 0 #ffffff, 2px 2px 0px #1b9552;
            cursor: pointer;
        }

        nav {
            display: flex;
            gap: 40px;
            margin-left: 60px;
        }

        nav a {
            text-decoration: none;
            color: #333333;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }

        .header-icons {
            display: flex;
            align-items: center;
            gap: 25px;
            font-size: 24px;
            color: #7da08d;
            cursor: pointer;
        }

        /* 3. 메인 비주얼 영역 (전체 화면 배경) */
        .main-viewport {
            width: 100%;
            height: 100vh;
            padding-top: 80px;
            position: relative;
            /* 배경 대문: 달성공원 정문 느낌의 전통 건축물 Unsplash 이미지 배치 */
            background: url('https://images.unsplash.com/photo-1596120244123-cc9326793433?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* [핵심 디자인] 이미지 중앙의 거대한 어두운 반원형 투명 아크 레이어 */
        .arc-dark-overlay {
            position: absolute;
            bottom: -30%;
            width: 110%;
            height: 115%;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 50% 50% 0 0;
            z-index: 1;
        }

        /* 4. 메인 중앙 콘텐츠 스타일 */
        .main-content {
            position: relative;
            z-index: 10;
            text-align: center;
            color: #ffffff;
            width: 100%;
            max-width: 800px;
            padding: 0 20px;
            margin-top: -40px;
        }

        /* 중앙 상단의 작은 곰/동물 프로필 아이콘 */
        .center-mini-icon {
            display: inline-block;
            background-color: #ffffff;
            border-radius: 50%;
            width: 42px;
            height: 42px;
            line-height: 42px;
            font-size: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .main-subtitle {
            font-size: 18px;
            color: #2edb74;
            margin-bottom: 12px;
            font-weight: bold;
            letter-spacing: -0.5px;
        }

        .main-title {
            font-size: 64px;
            font-weight: 800;
            margin-bottom: 12px;
            letter-spacing: -1px;
        }

        .main-desc {
            font-size: 28px;
            margin-bottom: 45px;
            font-weight: 400;
            letter-spacing: -0.5px;
        }

        /* [핵심 디자인] 완전한 타원형(알약 모양)의 흰색 검색창 */
        .search-container {
            width: 100%;
            max-width: 580px;
            position: relative;
            margin: 0 auto;
        }

        .search-input {
            width: 100%;
            padding: 16px 65px 16px 30px;
            border-radius: 50px;
            border: none;
            font-size: 18px;
            outline: none;
            background-color: #ffffff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.25);
        }

        .search-btn-icon {
            position: absolute;
            right: 28px;
            top: 50%;
            transform: translateY(-50%);
            color: #1b9552;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
        }

        /* 5. 장식 레이아웃 요소 (좌우 나뭇잎 및 사자 캐릭터) */
        /* 왼쪽 위 나뭇잎 */
        .leaf-left-top {
            position: absolute;
            top: 100px;
            left: -40px;
            font-size: 160px;
            color: #24b863;
            z-index: 5;
            transform: rotate(-20deg);
            user-select: none;
        }

        /* 왼쪽 아래 나뭇잎 */
        .leaf-left-bottom {
            position: absolute;
            bottom: -20px;
            left: -40px;
            font-size: 180px;
            color: #1b9552;
            z-index: 5;
            transform: rotate(15deg);
            user-select: none;
        }

        /* 오른쪽 위 나뭇잎 */
        .leaf-right-top {
            position: absolute;
            top: 90px;
            right: -40px;
            font-size: 150px;
            color: #24b863;
            z-index: 5;
            transform: rotate(40deg);
            user-select: none;
        }

        /* [핵심 디자인] 우측 하단 윙크하는 사자 캐릭터 배치 */
        .character-lion-zone {
            position: absolute;
            bottom: 50px;
            right: 60px;
            z-index: 20;
            user-select: none;
        }

        .lion-graphic {
            font-size: 110px;
            line-height: 1;
            display: block;
            filter: drop-shadow(3px 5px 6px rgba(0,0,0,0.25));
            /* 귀여운 느낌을 주기 위해 미세한 둥실거림 애니메이션 추가 */
            animation: gentleFloat 2.5s infinite ease-in-out;
        }

        @keyframes gentleFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(2deg); }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">달성공원</div>
        <nav>
            <a>공원안내</a>
            <a>VR</a>
            <a>기획 및 설계</a>
        </nav>
        <div class="header-icons">
            <span>👤</span>
            <span>☰</span>
        </div>
    </header>

    <main class="main-viewport">
        <div class="arc-dark-overlay"></div>

        <div class="leaf-left-top">🌿</div>
        <div class="leaf-left-bottom">🌿</div>
        <div class="leaf-right-top">🌿</div>

        <div class="main-content">
            <div class="center-mini-icon">🐻</div>
            <p class="main-subtitle">대구광역시의 오랜 전통이 담겨있는</p>
            <h1 class="main-title">대구 달성공원</h1>
            <p class="main-desc">모두와 함께 쉬는 공간</p>
            
            <div class="search-container">
                <input type="text" class="search-input" placeholder="">
                <span class="search-btn-icon">🔍</span>
            </div>
        </div>

        <div class="character-lion-zone">
            <span class="lion-graphic">🦁</span>
        </div>
    </main>

</body>
</html>
